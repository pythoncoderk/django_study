{% extends 'hello/base.html' %}

{% block title %}ログイン{% endblock %}

{% block content %}

<div class="row justify-content-center">

    <div class="col-md-4">

        <h1 class="mb-4">ログイン</h1>

        <form method="post">

            {% csrf_token %}

            <div class="mb-3">
                <label class="form-label">
                    ユーザー名
                </label>

                <input type="text"
                       name="username"
                       class="form-control">
            </div>

            <div class="mb-3">
                <label class="form-label">
                    パスワード
                </label>

                <input type="password"
                       name="password"
                       class="form-control">
            </div>

            <button type="submit"
                    class="btn btn-primary">
                ログイン
            </button>

        </form>

    </div>

</div>

{% endblock %}
